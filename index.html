function uuid() {
    return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function (c) {
        const r = (Math.random() * 16) | 0;
        const v = c === "x" ? r : (r & 0x3) | 0x8;
        return v.toString(16);
    });
}

function formatDate(dateStr = new Date()) {
    const d = dateStr instanceof Date ? dateStr : new Date(dateStr);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
}

function formatMoney(num) {
    if (num === "" || num === null || num === undefined || isNaN(Number(num))) return "0"; 
    return Number(num).toLocaleString("zh-TW", { maximumFractionDigits: 0 });
}

function calcAmount(item) {
    const qty = Number(item.qty || 0);
    const price = Number(item.price || 0);
    return qty * price;
}

function calcTotal(items) {
    return items.reduce((sum, it) => {
        if (it.type === "reference") return sum;

        let mainAmt = calcAmount(it);
        let subs = 0;

        if (it.subItems && it.subItems.length > 0) {
            subs = it.subItems.reduce(
                (s, sub) => (sub.type === "item" ? s + calcAmount(sub) : s),
                0
            );
        }

        return sum + mainAmt + subs;
    }, 0);
}

function calcNegotiated(total, discountPercent, customPrice) {
    const cp = Number(customPrice || 0);
    const dp = Number(discountPercent || 0);
    
    if (cp > 0) return cp;
    
    if (dp > 0 && dp <= 100) {
        return Math.round(total * (1 - dp / 100));
    }
    
    return total;
}

function generateQuoteNo(companyKey = "sinchang") {
  const prefix = COMPANY_DATA[companyKey]?.prefix || "QS";

  const d = new Date();
  const yy = String(d.getFullYear()).slice(-2);
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");

  const dateKey = `${yy}${mm}${dd}`;
  const storageKey = `quote_seq_${companyKey}_${dateKey}`;

  let seq = Number(localStorage.getItem(storageKey) || "0") + 1;

  if (seq > 99) {
    alert("今日報價單已超過 99 張，請確認");
    seq = 99;
  }

  localStorage.setItem(storageKey, seq);

  const nn = String(seq).padStart(2, "0");
  return `${prefix}${dateKey}${nn}`;
}

function loadCSV(url) {
  return new Promise((resolve, reject) => {
    fetch(url)
      .then(response => {
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        // ⭐ 關鍵修正 1: 請求時，指定讀取為 ArrayBuffer (原始二進制)
        return response.arrayBuffer(); 
      })
      .then(arrayBuffer => {
        // ⭐ 關鍵修正 2: 使用 TextDecoder 處理 UTF-8 編碼
        // 將 ArrayBuffer 轉換為文字，確保使用 UTF-8 編碼解析
        const decoder = new TextDecoder('utf-8');
        const csvText = decoder.decode(arrayBuffer);

        // 使用 XLSX.read 處理 CSV 內容
        // 由於我們已經處理了編碼，這裡可以將類型設為 'binary' 或 'text' 讓它解析
        const workbook = XLSX.read(csvText, { type: 'string' });
        const sheetName = workbook.SheetNames[0];
        const sheet = workbook.Sheets[sheetName];
        
        // 將 Sheet 轉換為 JSON 陣列 (包含標題列)
        const data = XLSX.utils.sheet_to_json(sheet); 
        resolve(data);
      })
      .catch(error => {
        console.error("Error loading CSV and fixing encoding:", error);
        alert(`載入資料失敗。請檢查 Google Sheet 網址及發布權限。錯誤: ${error.message}`);
        reject(error);
      });
  });
}

    ======================================================== */
  const updateQuote = React.useCallback((id, data) => {
    setQuotes(prev => {
      const newState = prev.map(q => q.id === id ? { ...q, ...data } : q);
      const updatedItem = newState.find(q => q.id === id);
      if (updatedItem) syncToCloud(updatedItem); 
      return newState;
    });
  }, [syncToCloud]);

  /* ========================================================
    4. 套用模式 (applyMode) - 必須放在 value 之前定義
    ======================================================== */
  const applyMode = React.useCallback((modeId) => {
    if (!activeQuoteId) return;
    const mode = QUOTE_MODES.find(m => m.id === modeId);
    if (!mode) return;

    if (!window.confirm("確定要覆蓋當前報價單內容嗎？此動作無法復原。")) return;

    const newItems = JSON.parse(JSON.stringify(mode.defaultItems)).map(item => ({
        ...item,
        id: uuid() 
    }));
    
    const newLeakageParts = (mode.defaultLeakageParts)
      ? JSON.parse(JSON.stringify(mode.defaultLeakageParts)).map(part => ({
          ...part,
          id: uuid()
        }))
      : [];

    const updateData = {
        items: newItems,
        leakageParts: newLeakageParts,
        notes: mode.defaultNotes,
        payment: mode.defaultPayment
    };

    updateQuote(activeQuoteId, updateData);
    
    const source = quotes.find(q => q.id === activeQuoteId);
    if (source && typeof syncToCloud === "function") {
      syncToCloud({ ...source, ...updateData });
    }
  }, [activeQuoteId, updateQuote, quotes, syncToCloud]);

  /* ========================================================
    5. 副作用處理 (useEffect) - 啟動與自動儲存
    ======================================================== */
  // A. 啟動載入
  React.useEffect(() => {
    const saved = localStorage.getItem("HERHSIN_QUOTES");
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        if (Array.isArray(parsed)) {
          setQuotes(parsed);
          if (parsed.length > 0) setActiveQuoteId(parsed[0].id);
        }
      } catch (e) { setQuotes([]); setActiveQuoteId(null); }
    }
    
    // 載入外部資料與雲端 (只在啟動執行一次)
    loadSpecItems();
    loadCustomers(); 
    if (typeof loadFromCloud === "function") {
      loadFromCloud();
    }
  }, []); 

  // B. 自動存入本地 (同步更新 localStorage)
  React.useEffect(() => {
    localStorage.setItem("HERHSIN_QUOTES", JSON.stringify(quotes));
  }, [quotes]);

  /* ========================================================
    6. 最後匯出 Context Value
    ======================================================== */
  const activeQuote = quotes.find(q => q.id === activeQuoteId);

  const value = {
    company, setCompany, quotes, setQuotes,
    activeQuote, activeQuoteId, setActiveQuoteId,
    specItems, customers, loadSpecItems,
    createQuote, deleteQuote, updateQuote, applyMode,
    duplicateQuote, loadFromCloud, syncToCloud 
  };

  window.__APP_CONTEXT__ = value;

  return (
    <AppContext.Provider value={value}>
      {children}
    </AppContext.Provider>
  );
} // 👈 整個 AppProvider 唯一的結尾大括號

        type: "image",
        name: "",

    const newSubItems = item.subItems.filter(s => s.id !== subId);
    updateItem({ subItems: newSubItems });

function CustomerSearchInput({ value, onChange, onSelect }) {
  const { customers } = React.useContext(AppContext); // 從 Context 讀取客戶資料
  const [searchTerm, setSearchTerm] = React.useState(value);
  const [showSuggestions, setShowSuggestions] = React.useState(false);
  const wrapperRef = React.useRef(null);

  // 當 QuoteEditor 傳入的 value 改變時，更新 searchTerm (通常是載入新報價單時)
  React.useEffect(() => {
    setSearchTerm(value);
  }, [value]);

  // 點擊外部時隱藏建議清單
  React.useEffect(() => {
    function handleClickOutside(event) {
      if (wrapperRef.current && !wrapperRef.current.contains(event.target)) {
        setShowSuggestions(false);
      }
    }
    document.addEventListener("mousedown", handleClickOutside);
    return () => document.removeEventListener("mousedown", handleClickOutside);
  }, [wrapperRef]);
  
  // 篩選客戶列表的邏輯 (只要輸入一個字元就開始篩選)
  const filteredCustomers = React.useMemo(() => {
    if (!searchTerm || searchTerm.trim().length === 0) return [];
    
    const lowerCaseSearch = searchTerm.trim().toLowerCase();
    
    // 關鍵：篩選邏輯，只要「客戶名稱」包含關鍵字就顯示
    return (customers || [])
        .filter(c => c["客戶名稱"]?.toLowerCase().includes(lowerCaseSearch))
        .slice(0, 10); // 只顯示前 10 筆
  }, [customers, searchTerm]);

  const handleInputChange = (e) => {
    const newValue = e.target.value;
    setSearchTerm(newValue); // 更新搜尋狀態，讓 filteredCustomers 重新計算
    onChange(newValue); // 更新 QuoteEditor 的 activeQuote
    setShowSuggestions(true); // 顯示建議清單
  };

  const handleSuggestionClick = (customer) => {
    onSelect(customer); // 呼叫父元件的選擇處理邏輯 (帶入所有資料)
    setSearchTerm(customer["客戶名稱"]); // 確保輸入框顯示完整名稱
    setShowSuggestions(false); // 隱藏清單
  };

  return (
    <div className="relative" ref={wrapperRef}>
      <input
        type="text"
        value={value} // 這裡使用 value，確保輸入框與 QuoteEditor 狀態同步
        onChange={handleInputChange}
        onFocus={() => setShowSuggestions(true)}
        className="w-full border border-gray-300 rounded px-2 py-1 text-sm focus:ring-1 focus:ring-blue-500 outline-none"
        placeholder="輸入關鍵字..."
        autoComplete="off" // 避免瀏覽器內建的自動填充干擾
      />
      
      {/* 搜尋建議清單：只有在 showSuggestions 且有篩選結果時才顯示 */}
      {(showSuggestions && filteredCustomers.length > 0) && (
        <ul className="absolute z-10 w-full max-h-48 overflow-y-auto bg-white border border-gray-400 rounded mt-1 shadow-lg">
          {filteredCustomers.map((c, i) => (
            <li
              key={i}
              className="px-3 py-2 text-sm cursor-pointer hover:bg-blue-100 border-b border-gray-200"
              onClick={() => handleSuggestionClick(c)}
            >
              <span className="font-bold">{c["客戶名稱"]}</span>
              {c["聯絡人"] && <span className="text-gray-500 ml-2 text-xs">({c["聯絡人"]})</span>}
            </li>
          ))}
        </ul>
      )}
    </div>
  );
}
function RichTextEditor({ value, onChange, rows = 8 }) {
  const editorRef = React.useRef(null);
  const [isReady, setIsReady] = React.useState(false);

  // 初始載入時設定 HTML 內容
  React.useEffect(() => {
    if (editorRef.current && !isReady) {
      editorRef.current.innerHTML = value || "";
      setIsReady(true);
    }
  }, []);

  // 當外部 value 改變時（例如切換報價單），同步更新
  React.useEffect(() => {
    if (editorRef.current && isReady) {
      // 避免游標位置跑掉：只有內容真的不一樣才更新
      if (editorRef.current.innerHTML !== (value || "")) {
        editorRef.current.innerHTML = value || "";
      }
    }
  }, [value]);

  const execCmd = (command, val = null) => {
    editorRef.current.focus();
    document.execCommand(command, false, val);
  };

  const applyColor = (color) => {
    editorRef.current.focus();
    document.execCommand("foreColor", false, color);
  };

  const handleInput = () => {
    if (onChange) onChange(editorRef.current.innerHTML);
  };

  const TOOLBAR_BTN = "px-2 py-1 text-sm border border-gray-300 rounded hover:bg-gray-100 transition font-bold";

  return (
    <div className="border border-gray-300 rounded-lg overflow-hidden shadow-sm">
      {/* 工具列 */}
      <div className="flex flex-wrap items-center gap-1 px-2 py-1.5 bg-gray-50 border-b border-gray-200">
        <button type="button" className={TOOLBAR_BTN} style={{fontWeight:"900"}} onClick={() => execCmd("bold")} title="粗體 (Ctrl+B)">B</button>
        <button type="button" className={TOOLBAR_BTN} style={{fontStyle:"italic"}} onClick={() => execCmd("italic")} title="斜體 (Ctrl+I)">I</button>
        <button type="button" className={TOOLBAR_BTN} style={{textDecoration:"underline"}} onClick={() => execCmd("underline")} title="底線 (Ctrl+U)">U</button>
        <div className="w-px h-5 bg-gray-300 mx-1" />
        {/* 顏色按鈕 */}
        {[
          { color: "#dc2626", label: "紅" },
          { color: "#2563eb", label: "藍" },
          { color: "#16a34a", label: "綠" },
          { color: "#d97706", label: "橙" },
          { color: "#000000", label: "黑" },
        ].map(({ color, label }) => (
          <button
            key={color}
            type="button"
            onClick={() => applyColor(color)}
            title={`${label}色文字`}
            className="w-6 h-6 rounded border border-gray-300 hover:scale-110 transition-transform flex items-center justify-center text-white text-[10px] font-bold"
            style={{ backgroundColor: color }}
          >
            A
          </button>
        ))}
        <div className="w-px h-5 bg-gray-300 mx-1" />
        <button type="button" className={TOOLBAR_BTN + " text-xs"} onClick={() => execCmd("removeFormat")} title="清除格式">清除</button>
      </div>
      {/* 可編輯區域 */}
      <div
        ref={editorRef}
        contentEditable
        suppressContentEditableWarning
        onInput={handleInput}
        className="w-full outline-none px-3 py-2 text-sm bg-white"
        style={{ minHeight: `${rows * 1.6}rem`, whiteSpace: "pre-wrap", lineHeight: "1.6" }}
      />
    </div>
  );
}

function ExportButton() {
  const { activeQuote } = React.useContext(AppContext);

  const handleExport = () => {
    if (!activeQuote || !activeQuote.items?.length) {
      alert("請先新增報價項目");
      return;
    }

    const companyKey = activeQuote.company || "herhsin";
    const company = COMPANY_DATA[companyKey];
    const total = calcTotal(activeQuote.items);
    const negotiated = calcNegotiated(total, activeQuote.discountPercent, activeQuote.negotiatedPrice);
    
    // 判斷是否顯示最終報價
    const showFinalPrice = (activeQuote.discountPercent > 0) || (activeQuote.negotiatedPrice > 0);

    const rows = [];
    let r = 0;

    rows[r++] = [company.name];
    rows[r++] = ["工程報價單"];
    rows[r++] = [];

    rows[r++] = ["報價單號", activeQuote.quoteNo, "", "", "報價日期", activeQuote.date];
    rows[r++] = ["工程名稱", activeQuote.title];
    rows[r++] = ["客戶名稱", activeQuote.customerName, "", "聯絡人", activeQuote.contact];
    rows[r++] = ["工程地點", activeQuote.location];
    rows[r++] = [];

    rows[r++] = ["項次","品名","規格 / 補充內容","單位","數量","單價","金額(小計)","備註","用料明細","🔒內部成本備註(僅內部)"];

    let index = 1;
    activeQuote.items.forEach(item => {
      rows[r++] = [
        index++,
        item.name || "",
        item.specMain || "",
        item.unit || "",
        item.qty || "",
        item.price || "",
        calcAmount(item),
        item.remarks || "",
        item.specMaterial || "",
        item.internalCost || ""
      ];

      if (item.specMaterial) {
         rows[r++] = ["", `用料明細：${item.specMaterial}`, "", "", "", "", "", "", ""];
      }

      (item.subItems || []).forEach(sub => {
        if (sub.type === "text") {
          rows[r++] = ["", `補充：${sub.name || ""}`, sub.remarks || "", "", "", "", "", "", ""];
        }
        if (sub.type === "image") {
          rows[r++] = ["", "補充圖片", "（圖片請參考列印版）", "", "", "", "", "", ""];
        }
      });
    });

    rows[r++] = [];
    rows[r++] = ["", "", "", "", "", "總計", total];
    
    // ⭐ 如果沒有折扣/自定義價格，就不輸出這兩行
    if (showFinalPrice) {
        rows[r++] = ["", "", "", "", "", "折扣(%)", activeQuote.discountPercent || 0];
        rows[r++] = ["", "", "", "", "", "最終報價", negotiated];
    }
    
    rows[r++] = [];
    rows[r++] = ["備註"];
    rows[r++] = [activeQuote.notes || ""];
    rows[r++] = [];
    rows[r++] = ["付款條件"];
    rows[r++] = [activeQuote.payment || ""];

    const ws = XLSX.utils.aoa_to_sheet(rows);

    ws["!merges"] = [
      { s: { r: 0, c: 0 }, e: { r: 0, c: 8 } },
      { s: { r: 1, c: 0 }, e: { r: 1, c: 8 } },
      { s: { r: 4, c: 1 }, e: { r: 4, c: 8 } },
      { s: { r: 5, c: 1 }, e: { r: 5, c: 8 } },
    ];
    
   ws["!cols"] = [{ wch: 12 }, { wch: 26 }, { wch: 42 }, { wch: 8 }, { wch: 8 }, { wch: 16 }, { wch: 18 }, { wch: 22 }, { wch: 32 }, { wch: 40 }];

    Object.keys(ws).forEach(key => {
      if (ws[key]?.v && typeof ws[key].v === "number") ws[key].z = "#,##0";
    });

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "報價單");

    const filename = `${activeQuote.quoteNo}_${activeQuote.customerName || "未填客戶"}-${activeQuote.title || "未命名工程"} 報價單.xlsx`.replace(/[\\/:*?"<>|]/g,"");
    XLSX.writeFile(wb, filename);
  };

  return (
    <button
      onClick={handleExport}
      className="bg-gray-600 text-white px-4 py-2 rounded hover:bg-gray-700"
    >
      匯出 Excel
    </button>
  );
}

              <td colspan="6" class="text-right font-bold" style="color: red; font-size: 14pt;">最終報價金額（未稅）</td>
              <td class="text-right font-bold" style="color: red; font-size: 18pt; border-bottom: 3.5px double red;">${formatMoney(negotiatedAmount)}</td>
              <td></td>
            </tr>` : ""}
          </tbody>
        </table>

        ${hasLeakageParts ? `
        <div style="margin-top: 25px; border-left: 5px solid #2563eb; padding-left: 10px; font-weight: bold; font-size: 13pt;">※ 實支實付維修零件價目表</div>
        <table style="margin-top: 10px; width: 100%; border: 1px solid black;">
          <tr style="background-color: #f0f0f0;">
            <th width="40%">品名</th><th width="35%">規格</th><th width="10%">單位</th><th width="15%">單價</th>
          </tr>
          ${activeQuote.leakageParts.map(p => `
            <tr>
              <td>${p.name || ""}</td><td>${p.spec || ""}</td><td class="text-center">${p.unit || ""}</td><td class="text-right font-bold">${formatMoney(p.price)}</td>
            </tr>
          `).join("")}
        </table>` : ""}

        <table style="width: 100%; border: none; margin-top: 35px;">
          <tr>
            <td style="width: 50%; vertical-align: top; border: 1px solid black; height: 120px; padding: 10px;">
              <strong style="font-size: 15pt;">備註：</strong><br/>
              <div style="font-size: 11pt; white-space: pre-wrap;">${activeQuote.notes || ""}</div>
            </td>
            <td style="width: 50%; vertical-align: top; border: 1px solid black; height: 120px; padding: 10px;">
              <strong style="font-size: 15pt;">付款條件：</strong><br/>
              <div style="font-size: 11pt; white-space: pre-wrap;">${activeQuote.payment || ""}</div>
            </td>
          </tr>
        </table>

        <table style="width: 100%; border: 2px solid black; margin-top: 10px;">
          <tr>
            <td style="width: 50%; height: 150px; vertical-align: top; border-right: 1px solid black; padding: 10px;">
              <strong style="font-size: 12pt;">公司報價章：</strong><br/>
              ${companyInfo.stamp ? `<img src="${companyInfo.stamp}" width="100" style="display:block; margin: 10px auto;" />` : ""}
            </td>
            <td style="width: 50%; height: 150px; vertical-align: top; padding: 10px;"><strong style="font-size: 12pt;">客戶回簽：</strong></td>
          </tr>
          <tr>
            <td class="text-center" style="border-top: none; font-size: 13pt; font-weight: bold;">
              日期：<span style="text-decoration: underline;">&nbsp;&nbsp;${activeQuote.stampDate || activeQuote.date}&nbsp;&nbsp;</span>
            </td>
            <td class="text-center" style="border-top: none; font-size: 12pt;">日期：</td>
          </tr>
        </table>
      </body>
      </html>
    `;
    const filename = `${activeQuote.quoteNo}_${activeQuote.customerName || "客戶"}_報價單.doc`;
    const blob = new Blob(["\ufeff", wordContent], { type: "application/msword;charset=utf-8" });
    const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = filename; link.click();
  };

  return (
    <button onClick={handleExportWord} className="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700 shadow-md">匯出 Word (PDF 同步版)</button>
  );
}

function ExportPDFButton() {
  const { activeQuote } = React.useContext(AppContext);
  const handleExportPDF = () => {
    const printOnlyLayout = document.querySelector('.print-only-layout');
    if (!printOnlyLayout) { alert("找不到列印內容"); return; }
    const originalTitle = document.title;
    document.title = `${activeQuote.quoteNo}_${activeQuote.customerName}_報價單`;
    const originalDisplay = printOnlyLayout.style.display;
    printOnlyLayout.style.display = 'block';
    window.print();
    setTimeout(() => { printOnlyLayout.style.display = originalDisplay; document.title = originalTitle; }, 500);
  };
  return (
    <button onClick={handleExportPDF} className="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700 shadow-lg flex items-center gap-2">📄 轉存 PDF 檔案</button>
  );
}

function PrintButton() {
  const handlePrint = () => {
    const editorRoot = document.querySelector('.p-8.bg-gray-100.rounded-xl');
    const printOnlyLayout = document.querySelector('.print-only-layout');
    if (!editorRoot || !printOnlyLayout) { window.print(); return; }
    const originalEditorDisplay = editorRoot.style.display;
    const originalPrintDisplay = printOnlyLayout.style.display;
    editorRoot.style.display = 'none';
    printOnlyLayout.style.display = 'block';
    window.print();
    setTimeout(() => { editorRoot.style.display = originalEditorDisplay; printOnlyLayout.style.display = originalPrintDisplay; }, 500);
  };
  return (
    <button onClick={handlePrint} className="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 shadow-lg">列印報價單</button>
  );
}

function LeakagePartsEditor({ parts, updateQuote }) {
  const handleChange = (id, field, value) => { const newParts = (parts || []).map(p => p.id === id ? { ...p, [field]: value } : p); updateQuote({ leakageParts: newParts }); };
  const handleVariantChange = (id, variantLabel) => { const targetPart = parts.find(p => p.id === id); if (!targetPart || !targetPart.variants) return; const selectedVariant = targetPart.variants.find(v => v.label === variantLabel); if (selectedVariant) { const newParts = parts.map(p => p.id === id ? { ...p, spec: selectedVariant.spec, price: selectedVariant.price, selectedVariantLabel: variantLabel } : p); updateQuote({ leakageParts: newParts }); } };
  const handleDelete = (id) => { if(!window.confirm("確定刪除此零件嗎？")) return; const newParts = (parts || []).filter(p => p.id !== id); updateQuote({ leakageParts: newParts }); };
  const handleAdd = () => { const newPart = { id: uuid(), name: "", spec: "", unit: "式", price: 0 }; updateQuote({ leakageParts: [...(parts || []), newPart] }); };
  return (
    <div className="mt-8 mb-6 border-t pt-6 no-print">
      <div className="flex justify-between items-center mb-4"><h3 className="text-lg font-bold text-gray-700 border-l-4 border-blue-500 pl-2">※ 實支實付維修零件編輯 (此區不計入總額)</h3><button onClick={handleAdd} className="bg-green-600 text-white px-3 py-1 rounded text-sm hover:bg-green-700 shadow flex items-center gap-1"><span>＋</span> 新增零件</button></div>
      <div className="bg-gray-50 p-4 rounded-lg border border-gray-200">
        <div className="grid grid-cols-12 gap-2 text-sm text-gray-500 mb-2 px-2"><div className="col-span-4">品名</div><div className="col-span-4">規格說明 (可切換)</div><div className="col-span-1 text-center">單位</div><div className="col-span-2 text-right">單價</div><div className="col-span-1"></div></div>
        {(parts || []).map((part) => (
          <div key={part.id} className="grid grid-cols-12 gap-2 mb-2 items-center">
             <div className="col-span-4"><input className="w-full border p-2 rounded text-sm outline-none focus:ring-2 focus:ring-blue-300" value={part.name || ""} onChange={(e) => handleChange(part.id, "name", e.target.value)}/></div>
             <div className="col-span-4">
                {part.variants ? (
                  <select className="w-full border p-2 rounded text-sm text-blue-700 font-bold bg-white" value={part.selectedVariantLabel || ""} onChange={(e) => handleVariantChange(part.id, e.target.value)}>{part.variants.map((v, i) => <option key={i} value={v.label}>{v.label} - ${v.price.toLocaleString()}</option>)}</select>
                ) : <input className="w-full border p-2 rounded text-sm outline-none focus:ring-2 focus:ring-blue-300" value={part.spec || ""} onChange={(e) => handleChange(part.id, "spec", e.target.value)}/>}
             </div>
             <div className="col-span-1"><input className="w-full border p-2 rounded text-sm text-center" value={part.unit || ""} onChange={(e) => handleChange(part.id, "unit", e.target.value)}/></div>
             <div className="col-span-2"><input type="number" className="w-full border p-2 rounded text-sm text-right" value={part.price || 0} onChange={(e) => handleChange(part.id, "price", e.target.value)}/></div>
             <div className="col-span-1 text-center"><button onClick={() => handleDelete(part.id)} className="text-red-400 hover:text-red-600">✕</button></div>
          </div>
        ))}
      </div>
    </div>
  );
}
