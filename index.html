function uuid() {
    return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function (c) {
        const r = (Math.random() * 16) | 0;
        const v = c === "x" ? r : (r & 0x3) | 0x8;
        return v.toString(16);
    });
}

function formatDate(dateStr = new Date()) {
    const d = dateStr instanceof Date ? dateStr : new Date(dateStr);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
}

function formatMoney(num) {
    if (num === "" || num === null || num === undefined || isNaN(Number(num))) return "0"; 
    return Number(num).toLocaleString("zh-TW", { maximumFractionDigits: 0 });
}

function calcAmount(item) {
    const qty = Number(item.qty || 0);
    const price = Number(item.price || 0);
    return qty * price;
}

function calcTotal(items) {
    return items.reduce((sum, it) => {
        if (it.type === "reference") return sum;

        let mainAmt = calcAmount(it);
        let subs = 0;

        if (it.subItems && it.subItems.length > 0) {
            subs = it.subItems.reduce(
                (s, sub) => (sub.type === "item" ? s + calcAmount(sub) : s),
                0
            );
        }

        return sum + mainAmt + subs;
    }, 0);
}

function calcNegotiated(total, discountPercent, customPrice) {
    const cp = Number(customPrice || 0);
    const dp = Number(discountPercent || 0);
    
    if (cp > 0) return cp;
    
    if (dp > 0 && dp <= 100) {
        return Math.round(total * (1 - dp / 100));
    }
    
    return total;
}

function generateQuoteNo(companyKey = "sinchang") {
  const prefix = COMPANY_DATA[companyKey]?.prefix || "QS";

  const d = new Date();
  const yy = String(d.getFullYear()).slice(-2);
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");

  const dateKey = `${yy}${mm}${dd}`;
  const storageKey = `quote_seq_${companyKey}_${dateKey}`;

  let seq = Number(localStorage.getItem(storageKey) || "0") + 1;

  if (seq > 99) {
    alert("今日報價單已超過 99 張，請確認");
    seq = 99;
  }

  localStorage.setItem(storageKey, seq);

  const nn = String(seq).padStart(2, "0");
  return `${prefix}${dateKey}${nn}`;
}

function loadCSV(url) {
  return new Promise((resolve, reject) => {
    fetch(url)
      .then(response => {
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        // ⭐ 關鍵修正 1: 請求時，指定讀取為 ArrayBuffer (原始二進制)
        return response.arrayBuffer(); 
      })
      .then(arrayBuffer => {
        // ⭐ 關鍵修正 2: 使用 TextDecoder 處理 UTF-8 編碼
        // 將 ArrayBuffer 轉換為文字，確保使用 UTF-8 編碼解析
        const decoder = new TextDecoder('utf-8');
        const csvText = decoder.decode(arrayBuffer);

        // 使用 XLSX.read 處理 CSV 內容
        // 由於我們已經處理了編碼，這裡可以將類型設為 'binary' 或 'text' 讓它解析
        const workbook = XLSX.read(csvText, { type: 'string' });
        const sheetName = workbook.SheetNames[0];
        const sheet = workbook.Sheets[sheetName];
        
        // 將 Sheet 轉換為 JSON 陣列 (包含標題列)
        const data = XLSX.utils.sheet_to_json(sheet); 
        resolve(data);
      })
      .catch(error => {
        console.error("Error loading CSV and fixing encoding:", error);
        alert(`載入資料失敗。請檢查 Google Sheet 網址及發布權限。錯誤: ${error.message}`);
        reject(error);
      });
  });
}

    } catch (err) {
      console.error("❌ 副本雲端備份失敗:", err);
    }
  }
}, [GAS_URL]); // ⭐ 依賴項只留 GAS_URL
/* ========================================================
    3. 更新報價單 (updateQuote)
    ======================================================== */
  const updateQuote = React.useCallback((id, data) => {
    setQuotes(prev => {
      const newState = prev.map(q => q.id === id ? { ...q, ...data } : q);
      const updatedItem = newState.find(q => q.id === id);
      if (updatedItem) syncToCloud(updatedItem); 
      return newState;
    });
  }, [syncToCloud]);

  /* ========================================================
    4. 套用模式 (applyMode) - 必須放在 value 之前定義
    ======================================================== */
  const applyMode = React.useCallback((modeId) => {
    if (!activeQuoteId) return;
    const mode = QUOTE_MODES.find(m => m.id === modeId);
    if (!mode) return;

    if (!window.confirm("確定要覆蓋當前報價單內容嗎？此動作無法復原。")) return;

    const newItems = JSON.parse(JSON.stringify(mode.defaultItems)).map(item => ({
        ...item,
        id: uuid() 
    }));
    
    const newLeakageParts = (mode.defaultLeakageParts)
      ? JSON.parse(JSON.stringify(mode.defaultLeakageParts)).map(part => ({
          ...part,
          id: uuid()
        }))
      : [];

    const updateData = {
        items: newItems,
        leakageParts: newLeakageParts,
        notes: mode.defaultNotes,
        payment: mode.defaultPayment
    };

    updateQuote(activeQuoteId, updateData);
    
    const source = quotes.find(q => q.id === activeQuoteId);
    if (source && typeof syncToCloud === "function") {
      syncToCloud({ ...source, ...updateData });
    }
  }, [activeQuoteId, updateQuote, quotes, syncToCloud]);

  /* ========================================================
    5. 副作用處理 (useEffect) - 啟動與自動儲存
    ======================================================== */
  // A. 啟動載入
  React.useEffect(() => {
    const saved = localStorage.getItem("HERHSIN_QUOTES");
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        if (Array.isArray(parsed)) {
          setQuotes(parsed);
          if (parsed.length > 0) setActiveQuoteId(parsed[0].id);
        }
      } catch (e) { setQuotes([]); setActiveQuoteId(null); }
    }
    
    // 載入外部資料與雲端 (只在啟動執行一次)
    loadSpecItems();
    loadCustomers(); 
    if (typeof loadFromCloud === "function") {
      loadFromCloud();
    }
  }, []); 

  // B. 自動存入本地 (同步更新 localStorage)
  React.useEffect(() => {
    localStorage.setItem("HERHSIN_QUOTES", JSON.stringify(quotes));
  }, [quotes]);

  /* ========================================================
    6. 最後匯出 Context Value
    ======================================================== */
  const activeQuote = quotes.find(q => q.id === activeQuoteId);

  const value = {
    company, setCompany, quotes, setQuotes,
    activeQuote, activeQuoteId, setActiveQuoteId,
    specItems, customers, loadSpecItems,
    createQuote, deleteQuote, updateQuote, applyMode,
    duplicateQuote, loadFromCloud, syncToCloud 
  };

  window.__APP_CONTEXT__ = value;

  return (
    <AppContext.Provider value={value}>
      {children}
    </AppContext.Provider>
  );
} // 👈 整個 AppProvider 唯一的結尾大括號

      name: "",
      remarks: ""

    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const newSub = {
        id: uuid(),
        type: "image",
        name: "",
        imageData: reader.result

      updateItem({ subItems: [...(item.subItems || []), newSub] });

  };

    const newSubItems = item.subItems.filter(s => s.id !== subId);
    updateItem({ subItems: newSubItems });
  };

function CustomerSearchInput({ value, onChange, onSelect }) {
  const { customers } = React.useContext(AppContext); // 從 Context 讀取客戶資料
  const [searchTerm, setSearchTerm] = React.useState(value);
  const [showSuggestions, setShowSuggestions] = React.useState(false);
  const wrapperRef = React.useRef(null);

  // 當 QuoteEditor 傳入的 value 改變時，更新 searchTerm (通常是載入新報價單時)
  React.useEffect(() => {
    setSearchTerm(value);
  }, [value]);

  // 點擊外部時隱藏建議清單
  React.useEffect(() => {
    function handleClickOutside(event) {
      if (wrapperRef.current && !wrapperRef.current.contains(event.target)) {
        setShowSuggestions(false);
      }
    }
    document.addEventListener("mousedown", handleClickOutside);
    return () => document.removeEventListener("mousedown", handleClickOutside);
  }, [wrapperRef]);
  
  // 篩選客戶列表的邏輯 (只要輸入一個字元就開始篩選)
  const filteredCustomers = React.useMemo(() => {
    if (!searchTerm || searchTerm.trim().length === 0) return [];
    
    const lowerCaseSearch = searchTerm.trim().toLowerCase();
    
    // 關鍵：篩選邏輯，只要「客戶名稱」包含關鍵字就顯示
    return (customers || [])
        .filter(c => c["客戶名稱"]?.toLowerCase().includes(lowerCaseSearch))
        .slice(0, 10); // 只顯示前 10 筆
  }, [customers, searchTerm]);

  const handleInputChange = (e) => {
    const newValue = e.target.value;
    setSearchTerm(newValue); // 更新搜尋狀態，讓 filteredCustomers 重新計算
    onChange(newValue); // 更新 QuoteEditor 的 activeQuote
    setShowSuggestions(true); // 顯示建議清單
  };

  const handleSuggestionClick = (customer) => {
    onSelect(customer); // 呼叫父元件的選擇處理邏輯 (帶入所有資料)
    setSearchTerm(customer["客戶名稱"]); // 確保輸入框顯示完整名稱
    setShowSuggestions(false); // 隱藏清單
  };

  return (
    <div className="relative" ref={wrapperRef}>
      <input
        type="text"

function ExportButton() {
  const { activeQuote } = React.useContext(AppContext);

  const handleExport = () => {
    if (!activeQuote || !activeQuote.items?.length) {
      alert("請先新增報價項目");
      return;
    }

    const companyKey = activeQuote.company || "herhsin";
    const company = COMPANY_DATA[companyKey];
    const total = calcTotal(activeQuote.items);
    const negotiated = calcNegotiated(total, activeQuote.discountPercent, activeQuote.negotiatedPrice);
    
    // 判斷是否顯示最終報價
    const showFinalPrice = (activeQuote.discountPercent > 0) || (activeQuote.negotiatedPrice > 0);

    const rows = [];
    let r = 0;

    rows[r++] = [company.name];
    rows[r++] = ["工程報價單"];
    rows[r++] = [];

    rows[r++] = ["報價單號", activeQuote.quoteNo, "", "", "報價日期", activeQuote.date];
    rows[r++] = ["工程名稱", activeQuote.title];
    rows[r++] = ["客戶名稱", activeQuote.customerName, "", "聯絡人", activeQuote.contact];
    rows[r++] = ["工程地點", activeQuote.location];
    rows[r++] = [];

    rows[r++] = ["項次","品名","規格 / 補充內容","單位","數量","單價","金額(小計)","備註","用料明細"];

    let index = 1;
    activeQuote.items.forEach(item => {
      rows[r++] = [
        index++,
        item.name || "",
        item.specMain || "",
        item.unit || "",
        item.qty || "",
        item.price || "",
        calcAmount(item),
        item.remarks || "",
        item.specMaterial || ""
      ];

      if (item.specMaterial) {
         rows[r++] = ["", `用料明細：${item.specMaterial}`, "", "", "", "", "", "", ""];
      }

      (item.subItems || []).forEach(sub => {
        if (sub.type === "text") {
          rows[r++] = ["", `補充：${sub.name || ""}`, sub.remarks || "", "", "", "", "", "", ""];
        }
        if (sub.type === "image") {
          rows[r++] = ["", "補充圖片", "（圖片請參考列印版）", "", "", "", "", "", ""];
        }
      });
    });

    rows[r++] = [];
    rows[r++] = ["", "", "", "", "", "總計", total];
    
    // ⭐ 如果沒有折扣/自定義價格，就不輸出這兩行
    if (showFinalPrice) {
        rows[r++] = ["", "", "", "", "", "折扣(%)", activeQuote.discountPercent || 0];
        rows[r++] = ["", "", "", "", "", "最終報價", negotiated];
    }
    
    rows[r++] = [];
    rows[r++] = ["備註"];
    rows[r++] = [activeQuote.notes || ""];
    rows[r++] = [];
    rows[r++] = ["付款條件"];
    rows[r++] = [activeQuote.payment || ""];

    const ws = XLSX.utils.aoa_to_sheet(rows);

    ws["!merges"] = [
      { s: { r: 0, c: 0 }, e: { r: 0, c: 8 } },
      { s: { r: 1, c: 0 }, e: { r: 1, c: 8 } },
      { s: { r: 4, c: 1 }, e: { r: 4, c: 8 } },
      { s: { r: 5, c: 1 }, e: { r: 5, c: 8 } },
    ];
    
    ws["!cols"] = [{ wch: 12 }, { wch: 26 }, { wch: 42 }, { wch: 8 }, { wch: 8 }, { wch: 16 }, { wch: 18 }, { wch: 22 }, { wch: 32 }];

    Object.keys(ws).forEach(key => {
      if (ws[key]?.v && typeof ws[key].v === "number") ws[key].z = "#,##0";
    });

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "報價單");

    const filename = `${activeQuote.quoteNo}_${activeQuote.customerName || "未填客戶"}-${activeQuote.title || "未命名工程"} 報價單.xlsx`.replace(/[\\/:*?"<>|]/g,"");
    XLSX.writeFile(wb, filename);
  };

  return (
    <button
      onClick={handleExport}
      className="bg-gray-600 text-white px-4 py-2 rounded hover:bg-gray-700"
    >
      匯出 Excel
    </button>
  );
}

            <td width="50%" class="sig-box">
               <strong>客戶回簽</strong>
            </td>
          </tr>
          <tr>
             <td class="text-center" style="font-size: 8pt; border-top: none; padding-top: 0;">日期：</td>
             <td class="text-center" style="font-size: 8pt; border-top: none; padding-top: 0;">日期：</td>
          </tr>
        </table>

      </body>
      </html>
    `;

    // 3. 下載
    const filename = `${activeQuote.quoteNo}_${activeQuote.customerName || "客戶"}_報價單.doc`;
    const blob = new Blob(["\ufeff", wordContent], { type: "application/msword;charset=utf-8" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  };

  return (
    <button onClick={handleExportWord} className="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700">
      匯出 Word (極限版 v3)
    </button>
  );
}

// PrintButton (列印按鈕)
function PrintButton() {
  const handlePrint = () => {
    // 1. 取得需要切換的元素
    const editorRoot = document.querySelector('.p-8.bg-gray-100.rounded-xl'); // 編輯器主體
    const printOnlyLayout = document.querySelector('.print-only-layout');    // 隱藏的列印版面

    if (!editorRoot || !printOnlyLayout) {
      // 如果找不到元素，退而求其次直接呼叫 window.print()
      window.print();
      return;
    }

    // 2. 暫時隱藏編輯器，顯示列印專用版面
    // 這樣 window.print() 抓到的就會是那個「漂亮的預覽畫面」
    const originalEditorDisplay = editorRoot.style.display;
    const originalPrintDisplay = printOnlyLayout.style.display;

    editorRoot.style.display = 'none';
    printOnlyLayout.style.display = 'block';

    // 3. 觸發列印
    window.print();

    // 4. 列印完後（或取消後）恢復原狀
    setTimeout(() => {
      editorRoot.style.display = originalEditorDisplay;
      printOnlyLayout.style.display = originalPrintDisplay;
    }, 500);
  };

  return (
    <button 
      onClick={handlePrint} 
      className="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 shadow-lg"
    >
      列印報價單
    </button>
  );
}

/* ========================================================

   ======================================================== */
function LeakagePartsEditor({ parts, updateQuote }) {
  const handleChange = (id, field, value) => {
    const newParts = parts.map(p => p.id === id ? { ...p, [field]: value } : p);
    updateQuote({ leakageParts: newParts });
  };

  // ⭐ 新增：處理規格切換的函式
  const handleVariantChange = (id, variantLabel) => {
    const targetPart = parts.find(p => p.id === id);
    if (!targetPart || !targetPart.variants) return;

    // 找到對應的選項資料
    const selectedVariant = targetPart.variants.find(v => v.label === variantLabel);
    if (selectedVariant) {
      // 同時更新：規格、單價 (也可以選擇是否更新品名，這裡保留原品名)
      const newParts = parts.map(p => p.id === id ? { 
        ...p, 
        spec: selectedVariant.spec, 
        price: selectedVariant.price,
        selectedVariantLabel: variantLabel // 紀錄當前選到的，方便 UI 顯示
      } : p);
      updateQuote({ leakageParts: newParts });
    }
  };

  const handleDelete = (id) => {
    if(!window.confirm("確定刪除此零件嗎？")) return;
    const newParts = parts.filter(p => p.id !== id);
    updateQuote({ leakageParts: newParts });
  };

  const handleAdd = () => {
    const newPart = { id: uuid(), name: "", spec: "", unit: "式", price: 0 };
    updateQuote({ leakageParts: [...(parts || []), newPart] });
  };

  return (
    <div className="mt-8 mb-6 border-t pt-6 page-break-inside-avoid">
      <div className="flex justify-between items-center mb-4">
        <h3 className="text-lg font-bold text-gray-700 border-l-4 border-blue-500 pl-2">

          onClick={handleAdd} 
          className="bg-green-600 text-white px-3 py-1 rounded text-sm hover:bg-green-700 shadow flex items-center gap-1"
        >
          <span>＋</span> 新增零件
        </button>
      </div>

      <div className="bg-gray-50 p-4 rounded-lg border border-gray-200">
        <div className="grid grid-cols-12 gap-2 text-sm text-gray-500 mb-2 px-2">
           <div className="col-span-4">品名</div>
           <div className="col-span-4">規格說明 (可切換版本)</div>
           <div className="col-span-1 text-center">單位</div>
           <div className="col-span-2 text-right">單價</div>
           <div className="col-span-1"></div>
        </div>

        {(parts || []).map((part, index) => (
          <div key={part.id} className="grid grid-cols-12 gap-2 mb-2 items-center">
             
             {/* 1. 品名 */}
             <div className="col-span-4">
                <input 
                  className="w-full border p-2 rounded text-sm focus:ring-2 focus:ring-blue-200 outline-none" 
                  placeholder="輸入零件名稱..."
                  value={part.name} 
                  onChange={(e) => handleChange(part.id, "name", e.target.value)}
                />
             </div>

             {/* 2. 規格說明 (如果有選項，顯示下拉選單；否則顯示輸入框) */}
             <div className="col-span-4">
                {part.variants && part.variants.length > 0 ? (
                  <div className="flex gap-1">
                    {/* 下拉選單區域 */}
                    <select
                      className="w-full border p-2 rounded text-sm bg-yellow-50 focus:ring-2 focus:ring-yellow-200 outline-none cursor-pointer text-blue-700 font-bold"
                      value={part.selectedVariantLabel || (part.variants.find(v => v.price === part.price)?.label) || ""}
                      onChange={(e) => handleVariantChange(part.id, e.target.value)}
                    >
                      {part.variants.map((v, i) => (
                        <option key={i} value={v.label}>
                          {v.label} - ${v.price.toLocaleString()}

                    placeholder="輸入規格..."

                    onChange={(e) => handleChange(part.id, "spec", e.target.value)}
                  />
                )}
             </div>

             {/* 3. 單位 */}
             <div className="col-span-1">
                <input 
                  className="w-full border p-2 rounded text-sm text-center focus:ring-2 focus:ring-blue-200 outline-none" 
                  value={part.unit} 
                  onChange={(e) => handleChange(part.id, "unit", e.target.value)}
                />
             </div>

             {/* 4. 單價 (如果是下拉選單模式，建議鎖定單價或變色提示) */}
             <div className="col-span-2">
                <input

                  value={part.price} 
                  onFocus={(e) => e.target.select()}
                  onChange={(e) => handleChange(part.id, "price", e.target.value)}
                />
             </div>

             {/* 5. 刪除按鈕 */}
             <div className="col-span-1 text-center">
                <button 
                  onClick={() => handleDelete(part.id)} 
                  className="text-red-400 hover:text-red-600 hover:bg-red-50 p-2 rounded-full transition-colors"
                  title="刪除"
                >

                </button>

        {(parts || []).length === 0 && (

                目前沒有零件項目，請點擊上方按鈕新增。
            </div>
        )}
      </div>
    </div>
  );
}
